name: Deploy to Second Org
on:
  push:
    branches:
      - main  # This triggers when you merge a PR into main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v3

      - name: 'Install Salesforce CLI'
        run: npm install @salesforce/cli --global

      - name: 'Authenticate to Org'
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth_url.txt
          sf org login sfdx-url --sfdx-url-file auth_url.txt --set-default --alias targetOrg
          rm auth_url.txt

      - name: 'Deploy Metadata'
        run: sf project deploy start --target-org targetOrg