name: Deploy to Second Org
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so it can compare branches

      - name: 'Install Salesforce CLI'
        run: npm install @salesforce/cli --global

      - name: 'Install sfdx-git-delta'
        run: |
          echo y | sfdx plugins:install sfdx-git-delta

      - name: 'Authenticate to Org'
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > auth_url.txt
          sf org login sfdx-url --sfdx-url-file auth_url.txt --set-default --alias targetOrg
          rm auth_url.txt

      - name: 'Generate Delta (Changed Files Only)'
        run: |
          mkdir changed-sources
          # Compares the current commit to the one before the merge
          sfdx sgd:source:delta --to HEAD --from HEAD^ --output changed-sources/ --generate-delta

      - name: 'Deploy Metadata'
        run: |
          # If the delta folder has content, deploy ONLY that folder
          if [ -d "changed-sources/force-app" ]; then
            sf project deploy start --source-dir changed-sources/force-app --target-org targetOrg
          else
            echo "No Salesforce metadata changes detected. Skipping deploy."
          fi