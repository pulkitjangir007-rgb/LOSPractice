<template>
<lightning-card>
<div class="slds-m-around_medium">        
    <lightning-input type="number" name="input1" label="Enter a number" class="input1"></lightning-input>
    </div>
    <div class="slds-m-around_medium">        
    <lightning-input type="number" name="input2" label="Enter a number" class="input2"></lightning-input>
    </div>
    <div class="slds-m-around_medium">
    <lightning-input type="number" disabled value={result}></lightning-input>
    </div>
    <span class="slds-m-around_medium">
        <lightning-button variant="brand" label="Add" title="Primary action" onclick={handleAdd} class="slds-m-left_x-small"></lightning-button>
        <lightning-button variant="brand" label="Subtract" title="Primary action" onclick={handleSubtract} class="slds-m-left_x-small"></lightning-button>
        <lightning-button variant="brand" label="Multiply" title="Primary action" onclick={handleMultiply} class="slds-m-left_x-small"></lightning-button>
        <lightning-button variant="brand" label="Divide" title="Primary action" onclick={handleDivide} class="slds-m-left_x-small"></lightning-button>
    </span>
</lightning-card>   
</template>
